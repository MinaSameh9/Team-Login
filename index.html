<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Check-In</title>
<style>
  :root{
    --ink:#1B2430;
    --panel:#22303F;
    --panel-edge:#324154;
    --amber:#E8A33D;
    --green:#4FB477;
    --red:#D9645B;
    --paper:#F2EFE9;
    --dim:#8FA0B3;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:var(--ink);
    background-image:
      radial-gradient(circle at 50% 0%, #26344530, transparent 60%);
    font-family:'Courier New', ui-monospace, monospace;
    color:var(--paper);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .device{
    width:100%;
    max-width:380px;
    background:var(--panel);
    border:1px solid var(--panel-edge);
    border-radius:14px;
    box-shadow:0 20px 60px rgba(0,0,0,0.45);
    overflow:hidden;
  }
  .strip{
    height:6px;
    background:repeating-linear-gradient(90deg, var(--amber) 0 14px, transparent 14px 22px);
    opacity:0.85;
  }
  header{
    padding:22px 22px 14px;
    border-bottom:1px dashed var(--panel-edge);
  }
  .eyebrow{
    font-size:11px;
    letter-spacing:.18em;
    color:var(--dim);
    text-transform:uppercase;
  }
  h1{
    margin:6px 0 0;
    font-size:21px;
    font-weight:700;
    letter-spacing:.02em;
    font-family:Georgia, 'Times New Roman', serif;
  }
  .clock{
    margin-top:10px;
    font-size:13px;
    color:var(--amber);
    letter-spacing:.04em;
  }
  main{padding:20px 22px 22px;}
  label{
    display:block;
    font-size:11px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--dim);
    margin-bottom:6px;
  }
  select, input[type=text]{
    width:100%;
    padding:11px 12px;
    background:#1B2430;
    border:1px solid var(--panel-edge);
    border-radius:8px;
    color:var(--paper);
    font-family:inherit;
    font-size:15px;
    margin-bottom:16px;
  }
  select:focus, input:focus{outline:2px solid var(--amber); outline-offset:1px;}
  .loc-row{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    color:var(--dim);
    background:#1B2430;
    border:1px solid var(--panel-edge);
    border-radius:8px;
    padding:10px 12px;
    margin-bottom:18px;
    min-height:38px;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--dim);
    flex-shrink:0;
  }
  .dot.live{background:var(--green); box-shadow:0 0 8px var(--green);}
  .dot.err{background:var(--red);}
  .actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  button{
    border:none;
    border-radius:9px;
    padding:15px 0;
    font-family:inherit;
    font-weight:700;
    font-size:14px;
    letter-spacing:.06em;
    text-transform:uppercase;
    cursor:pointer;
    transition:transform .08s ease, filter .15s ease;
  }
  button:active{transform:scale(0.97);}
  #btnIn{background:var(--green); color:#0E2218;}
  #btnOut{background:var(--red); color:#2A0E0B;}
  button:disabled{filter:grayscale(0.6) opacity(0.5); cursor:not-allowed;}
  .status{
    margin-top:16px;
    font-size:13px;
    text-align:center;
    min-height:18px;
    color:var(--dim);
  }
  .status.ok{color:var(--green);}
  .status.bad{color:var(--red);}
  footer{
    padding:12px 22px 18px;
    border-top:1px dashed var(--panel-edge);
    font-size:10.5px;
    color:var(--dim);
    letter-spacing:.04em;
  }
  code{color:var(--amber);}
</style>
</head>
<body>
<div class="device">
  <div class="strip"></div>
  <header>
    <div class="eyebrow">Daily Attendance Log</div>
    <h1>Team Check-In</h1>
    <div class="clock" id="clock">--:--:--</div>
  </header>
  <main>
    <label for="name">Name</label>
    <select id="name">
      <option value="" disabled selected>Select your name</option>
    </select>

    <label for="customName" id="customNameLabel" style="display:none;">Type your name</label>
    <input type="text" id="customName" placeholder="Full name" style="display:none;">

    <div class="loc-row">
      <div class="dot" id="locDot"></div>
      <span id="locText">Location not captured yet</span>
    </div>

    <div class="actions">
      <button id="btnIn">Sign In</button>
      <button id="btnOut">Sign Out</button>
    </div>

    <div class="status" id="status"></div>
  </main>
  <footer>
    Endpoint: <code id="endpointShown">not configured</code> — see setup notes in chat.
  </footer>
</div>

<script>
/* ============================================================
   CONFIG — paste your Google Apps Script Web App URL here
   ============================================================ */
const ENDPOINT_URL = "https://script.google.com/macros/s/AKfycbwb4nWu-2cGJDJRhGmxKSUjnFlgAk96OGOdlAsI8zkVht8eb6nehdqQeKfVO62hBzn8CA/exec"; // e.g. "https://script.google.com/macros/s/XXXX/exec"

/* Edit this list to match your team members */
const TEAM_NAMES = [
  "Mina Sameh",
  "Youssef Hani",
  "Amr Singer",
  "Ahmed Ehab",
  "Other (type name)"
];

const nameSelect = document.getElementById('name');
TEAM_NAMES.forEach(n => {
  const opt = document.createElement('option');
  opt.value = n;
  opt.textContent = n;
  nameSelect.appendChild(opt);
});

const customLabel = document.getElementById('customNameLabel');
const customInput = document.getElementById('customName');
nameSelect.addEventListener('change', () => {
  const isOther = nameSelect.value === "Other (type name)";
  customLabel.style.display = isOther ? 'block' : 'none';
  customInput.style.display = isOther ? 'block' : 'none';
});

document.getElementById('endpointShown').textContent = ENDPOINT_URL || "not configured";

function tickClock(){
  document.getElementById('clock').textContent = new Date().toLocaleTimeString();
}
tickClock();
setInterval(tickClock, 1000);

let coords = null;
const locDot = document.getElementById('locDot');
const locText = document.getElementById('locText');

function captureLocation(){
  if(!navigator.geolocation){
    locDot.className = 'dot err';
    locText.textContent = 'Geolocation not supported on this device';
    return;
  }
  locText.textContent = 'Capturing location…';
  navigator.geolocation.getCurrentPosition(
    pos => {
      coords = { lat: pos.coords.latitude, lng: pos.coords.longitude, acc: pos.coords.accuracy };
      locDot.className = 'dot live';
      locText.textContent = `Lat ${coords.lat.toFixed(5)}, Lng ${coords.lng.toFixed(5)} (±${Math.round(coords.acc)}m)`;
    },
    err => {
      locDot.className = 'dot err';
      locText.textContent = 'Location permission denied — enable it to continue';
    },
    { enableHighAccuracy:true, timeout:10000 }
  );
}
captureLocation();

function getName(){
  if(nameSelect.value === "Other (type name)") return customInput.value.trim();
  return nameSelect.value;
}

async function submitEvent(type){
  const status = document.getElementById('status');
  const name = getName();

  if(!name){
    status.className = 'status bad';
    status.textContent = 'Please select or enter your name.';
    return;
  }
  if(!coords){
    status.className = 'status bad';
    status.textContent = 'Location not available yet — tap again in a second.';
    captureLocation();
    return;
  }
  if(!ENDPOINT_URL){
    status.className = 'status bad';
    status.textContent = 'Endpoint not configured yet — see setup notes.';
    return;
  }

  document.getElementById('btnIn').disabled = true;
  document.getElementById('btnOut').disabled = true;
  status.className = 'status';
  status.textContent = 'Sending…';

  const payload = {
    name,
    type,
    timestamp: new Date().toISOString(),
    lat: coords.lat,
    lng: coords.lng,
    accuracy: coords.acc
  };

  try{
    await fetch(ENDPOINT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    status.className = 'status ok';
    status.textContent = `${type === 'in' ? 'Signed in' : 'Signed out'} — logged successfully.`;
  }catch(e){
    status.className = 'status bad';
    status.textContent = 'Could not reach the log. Check your connection and try again.';
  }finally{
    document.getElementById('btnIn').disabled = false;
    document.getElementById('btnOut').disabled = false;
  }
}

document.getElementById('btnIn').addEventListener('click', () => submitEvent('in'));
document.getElementById('btnOut').addEventListener('click', () => submitEvent('out'));
</script>
</body>
</html>
